name: Build and Push Image

on:
  push:
    branches:
      - main

env:
  IMAGE: roshaneishara/argo-canary-demo-app

jobs:

  build:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate version
        id: version
        run: |
          echo "VERSION=v${{ github.run_number }}" >> $GITHUB_OUTPUT
          echo "SEMANTIC_VERSION=${{ github.run_number }}.0.0" >> $GITHUB_OUTPUT
          

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: roshaneishara
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ steps.version.outputs.VERSION }}
            ${{ env.IMAGE }}:latest


      - name: Debug repo access
        run: |
          curl -H "Authorization: token ${{ secrets.GH_PAT }}" \
          https://api.github.com/repos/mri-fernando/argo-canary-demo-helm

      - name: Checkout GitOps repo
        uses: actions/checkout@v4
        with:
          repository: mri-fernando/argo-canary-demo-helm
          token: ${{ secrets.GHES_TOKEN }}
          path: gitops

      - name: Update Helm values
        run: |
          cd gitops/demo-app
          ls
          cat values.yaml
          sed -i "s/tag:.*/tag: ${{ steps.version.outputs.VERSION }}/" values.yaml
          cat values.yaml

      - name: Update Helm Chart Version
        run: |
          cd gitops/demo-app
          ls
          cat Chart.yaml
          sed -i "s/appVersion:.*/appVersion: ${{ steps.version.outputs.SEMANTIC_VERSION }}/" Chart.yaml
          cat Chart.yaml

      - name: Commit and Push new Helm values
        run: |
          cd gitops
          git config user.name "github-actions"
          git config user.email "roshane.ishara@gmail.com"
          git add . || echo "No changes to add"
          git commit -m "Update image to ${{ steps.version.outputs.VERSION }}" || echo "No changes to commit"
          git push || echo "No changes to push"     